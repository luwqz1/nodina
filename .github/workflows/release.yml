name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write


jobs:
  wheels-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install Python
        run: |
          uv python install 3.13
          uv python install 3.14

      - name: Install tools
        run: |
          uv tool install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp313-* cp314-*"
          CIBW_SKIP: "pp* *musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
        run: uv tool run cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl


  wheels-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - run: |
          uv python install 3.13
          uv python install 3.14
          uv tool install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp313-* cp314-*"
          CIBW_SKIP: "pp*"
        run: uv tool run cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: wheelhouse/*.whl


  wheels-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - run: |
          uv python install 3.13
          uv python install 3.14
          uv tool install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp313-* cp314-*"
          CIBW_SKIP: "pp*"
        run: uv tool run cibuildwheel --output-dir wheelhouse


  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - run: uv python install 3.13

      - name: Build sdist
        run: |
          uv tool install build
          uv tool run build --sdist --outdir dist


  publish:
    runs-on: ubuntu-latest
    needs:
      - wheels-linux
      - wheels-macos
      - wheels-windows
      - sdist

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten
        run: |
          mkdir -p release
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release/ \;

      - name: Publish PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          
