name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  wheels-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Setup Python
        run: |
          uv python install 3.13
          uv python install 3.14

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Cache cython build artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/
            **/*.c
            **/*.cpp
          key: cython-${{ runner.os }}-${{ hashFiles('**/*.pyx', '**/*.pxd', '**/setup.py') }}

      - name: Install cibuildwheel
        run: uv tool install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp313-* cp314-*"
          CIBW_SKIP: "pp* *musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_BUILD: "pip install cython>=3.0 setuptools wheel"
          CIBW_BUILD_VERBOSITY: 1
        run: uv tool run cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: wheelhouse/*.whl


  wheels-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - run: |
          uv python install 3.13
          uv python install 3.14

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Cache cython build artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/
            **/*.c
            **/*.cpp
          key: cython-${{ runner.os }}-${{ hashFiles('**/*.pyx', '**/*.pxd', '**/setup.py') }}

      - name: Install cibuildwheel
        run: uv tool install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp313-* cp314-*"
          CIBW_SKIP: "pp*"
          CIBW_BEFORE_BUILD: "pip install cython>=3.0 setuptools wheel"
        run: uv tool run cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: wheelhouse/*.whl


  wheels-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - run: |
          uv python install 3.13
          uv python install 3.14

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install cibuildwheel
        run: uv tool install cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: "cp313-* cp314-*"
          CIBW_SKIP: "pp*"
          CIBW_BEFORE_BUILD: "pip install cython>=3.0 setuptools wheel"
        run: uv tool run cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: wheelhouse/*.whl


  build-cygwin:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        run: choco install msys2 -y

      - name: Update MSYS2
        run: C:\tools\msys64\usr\bin\bash -lc "pacman -Syu --noconfirm"

      - name: Install Python
        run: >
          C:\tools\msys64\usr\bin\bash -lc
          "pacman -S --noconfirm python python-pip python-setuptools python-wheel"

      - name: Build sdist (Cygwin validation)
        run: >
          C:\tools\msys64\usr\bin\bash -lc
          "python -m pip install -U pip build &&
           python -m build --sdist --outdir dist"

      - uses: actions/upload-artifact@v4
        with:
          name: cygwin-sdist
          path: dist/*.tar.gz


  sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3

      - run: uv python install 3.13

      - name: Build sdist
        run: |
          uv tool install build
          uv tool run build --sdist --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz


  publish:
    runs-on: ubuntu-latest
    needs:
      - wheels-linux
      - wheels-macos
      - wheels-windows
      - build-cygwin
      - sdist

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} release/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
