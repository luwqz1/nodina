name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  CIBW_CONFIG_FILE: .github/.cibuildwheel.toml
  CIBW_ARCHS_WINDOWS: AMD64

jobs:
  wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~\AppData\Local\uv\cache
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install cibuildwheel
        run: uv tool install cibuildwheel

      - name: Build wheels
        run: uv tool run cibuildwheel --config-file .github/.cibuildwheel.toml --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ runner.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error


  sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: |
          uv tool install build
          uv tool run --from build pyproject-build --sdist --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error


  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - wheels
      - sdist
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verify-metadata: false

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
